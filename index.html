
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productivitree</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#10b981">
  <style>
    /* For Tailwind JIT to work properly and for any essential global styles/animations if unavoidable */
    body {
      font-family: 'Inter', sans-serif; /* A nice default font */
    }
    @keyframes gentleSway {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }
    .animate-gentleSway {
      animation: gentleSway 3s ease-in-out infinite;
    }
    @keyframes urgentPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
    }
    .animate-urgentPulse {
      animation: urgentPulse 1s ease-in-out infinite;
    }
    @keyframes subtleDrift {
      0%, 100% { transform: translateX(0px) translateY(0px); opacity: 0.7; }
      25% { transform: translateX(8px) translateY(-4px); opacity: 1; }
      50% { transform: translateX(-8px) translateY(6px); opacity: 0.6; }
      75% { transform: translateX(5px) translateY(-2px); opacity: 0.9; }
    }
     /* Custom scrollbar for better aesthetics */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #2d3748; /* dark-700 */
    }
    ::-webkit-scrollbar-thumb {
      background: #4a5568; /* dark-600 */
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #718096; /* dark-500 */
    }
  </style>
  
</head>
<body class="bg-gray-900 text-white">
  <div id="root"></div>
  <script>
    console.log('HTML: Just before loading index.tsx');
  </script>
  <script type="module" src="/src/index.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(registration => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          })
          .catch(error => {
            console.log('ServiceWorker registration failed: ', error);
          });
      });
    }
  </script>
</body>
</html>
